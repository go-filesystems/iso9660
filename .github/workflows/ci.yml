name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # The interop test-suite masters real images with genisoimage and reads them
  # back, so the coverage figure is meaningful only when that tool is present.
  COVERAGE_MIN: "70.0"

jobs:
  # Native runners: full build + test (race + coverage). genisoimage is
  # installed so every TestInterop_* actually runs (they t.Skip otherwise).
  native:
    name: native ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout iso9660
        uses: actions/checkout@v4
        with:
          path: iso9660

      # go.mod carries `replace github.com/go-filesystems/interface =>
      # ../interface`, so the sibling module must sit next to this one.
      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: iso9660/go.mod

      - name: Install genisoimage (interop image mastering)
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage

      - name: Build
        working-directory: iso9660
        run: go build ./...

      - name: Test (race + coverage)
        working-directory: iso9660
        run: |
          go test -race -covermode=atomic -coverprofile=cover.out -timeout 10m ./...

      - name: Enforce coverage floor
        working-directory: iso9660
        run: |
          set -euo pipefail
          total=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "total coverage: ${total}% (floor ${COVERAGE_MIN}%)"
          awk -v c="$total" -v m="$COVERAGE_MIN" \
            'BEGIN { exit (c+0 >= m+0) ? 0 : 1 }' \
            || { echo "coverage ${total}% below floor ${COVERAGE_MIN}%"; exit 1; }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.arch }}
          path: iso9660/cover.out
          if-no-files-found: ignore

  # Emulated runners: cross-compile a static (CGO_ENABLED=0) test binary per
  # package and run it under QEMU for each non-native 64-bit arch. genisoimage
  # is installed inside the emulated container so the interop tests run for
  # real on the target arch rather than skipping.
  #
  # s390x is big-endian. ISO 9660 stores integers in ECMA-119 "both-byte"
  # fields (a little-endian value immediately followed by the same value
  # big-endian, 7.2.3 / 7.3.3). The reader is explicit about which half it
  # decodes (binary.LittleEndian / binary.BigEndian — never a native cast), so
  # the s390x leg is a real test that the byte-order handling is correct on a
  # big-endian host, not an accident of running on little-endian x86/arm.
  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu: power9
          - arch: s390x
            image: debian:trixie
            qemu: qemu
    steps:
      - name: Checkout iso9660
        uses: actions/checkout@v4
        with:
          path: iso9660

      - name: Checkout interface (sibling replace target)
        uses: actions/checkout@v4
        with:
          repository: go-filesystems/interface
          path: interface

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
          cache-dependency-path: iso9660/go.mod

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile per-package test binaries
        working-directory: iso9660
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p /tmp/tests
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            # Skip packages without test files (go test -c emits no binary).
            go test -c -cover -o "/tmp/tests/${name}.test" "$pkg"
            if [ -f "/tmp/tests/${name}.test" ]; then
              echo "built ${name}.test"
            fi
          done
          ls -la /tmp/tests

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        env:
          QEMU_CPU: ${{ matrix.qemu }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(/tmp/tests/*.test)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no test binaries to run"; exit 0
          fi
          rc=0
          for bin in "${bins[@]}"; do
            base=$(basename "$bin")
            echo "::group::${base}"
            # Install genisoimage inside the emulated container so the interop
            # tests master and read back a real image on the target arch. The
            # apt step runs under QEMU; -test.timeout is generous accordingly.
            # genisoimage install is best-effort: on an arch/port that does not
            # ship it the interop tests t.Skip (the binary still links and the
            # non-interop code paths still run); a genuine test failure still
            # fails the job.
            if ! docker run --rm \
              --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU="${QEMU_CPU}" \
              -e DEBIAN_FRONTEND=noninteractive \
              -v /tmp/tests:/t -w /t \
              ${{ matrix.image }} \
              bash -c "apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq genisoimage >/dev/null 2>&1 || echo 'genisoimage unavailable on this arch — interop tests will skip'; ./${base} -test.v -test.timeout 30m"; then
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc
